<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src __CSP_SOURCE__ 'unsafe-inline'; style-src __CSP_SOURCE__ 'unsafe-inline'; img-src __CSP_SOURCE__ blob: data:; worker-src __CSP_SOURCE__ blob:; font-src __CSP_SOURCE__;">
  <title>LaTeX Preview</title>
  <style>
    html, body { height: 100%; }
    body {
      margin: 0;
      padding: 0;
      background: #2b2b2b;
      color: var(--vscode-foreground);
      font-family: var(--vscode-font-family);
    }
    #status {
      padding: 12px 16px;
      color: #ccc;
      font-style: italic;
    }
    #status.hidden { display: none; }
    #error {
      padding: 12px 16px;
      color: #ff9b9b;
      font-family: var(--vscode-editor-font-family, monospace);
      white-space: pre-wrap;
      background: #3a1f1f;
      border-left: 3px solid #c44;
      max-height: 40vh;
      overflow: auto;
    }
    #error.hidden { display: none; }
    #container {
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    canvas {
      background: white;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
      max-width: 100%;
      height: auto;
    }
  </style>
</head>
<body>
  <div id="status">Waiting for first compile…</div>
  <div id="error" class="hidden"></div>
  <div id="container"></div>
  <script>
    window.__PDFJS_URI__ = "__PDFJS_URI__";
    window.__WORKER_URI__ = "__WORKER_URI__";
  </script>
  <script type="module" src="__SCRIPT_URI__"></script>
</body>
</html>
