<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src {{CSP_SOURCE}} 'unsafe-inline'; style-src {{CSP_SOURCE}} 'unsafe-inline'; img-src {{CSP_SOURCE}} blob: data:; worker-src {{CSP_SOURCE}} blob:; font-src {{CSP_SOURCE}};">
  <title>LaTeX Preview</title>
  <style>
    html, body { height: 100%; }
    body {
      margin: 0;
      padding: 0;
      background: #2b2b2b;
      color: var(--vscode-foreground);
      font-family: var(--vscode-font-family);
    }
    #status {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 6px 16px;
      background: rgba(43, 43, 43, 0.95);
      color: #ccc;
      font-style: italic;
      font-size: 12px;
      border-top: 1px solid #555;
      z-index: 10;
    }
    #status.hidden { display: none; }
    /* Keep last page from being hidden behind the fixed status bar. */
    #container { padding-bottom: 48px; }
    #error {
      padding: 12px 16px;
      color: #ff9b9b;
      font-family: var(--vscode-editor-font-family, monospace);
      white-space: pre-wrap;
      background: #3a1f1f;
      border-left: 3px solid #c44;
      max-height: 40vh;
      overflow: auto;
    }
    #error.hidden { display: none; }
    #warning {
      padding: 12px 16px;
      color: #ffd28a;
      font-family: var(--vscode-editor-font-family, monospace);
      white-space: pre-wrap;
      background: #3a2f1f;
      border-left: 3px solid #c89a44;
      max-height: 30vh;
      overflow: auto;
    }
    #warning.hidden { display: none; }
    #container {
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    canvas {
      background: white;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
      max-width: 100%;
      height: auto;
    }
  </style>
</head>
<body>
  <div id="error" class="hidden"></div>
  <div id="warning" class="hidden"></div>
  <div id="container"></div>
  <div id="status">Waiting for first compile…</div>
  <script>
    window.__PDFJS_URI__ = "{{PDFJS_URI}}";
    window.__WORKER_URI__ = "{{WORKER_URI}}";
  </script>
  <script type="module" src="{{SCRIPT_URI}}"></script>
</body>
</html>
