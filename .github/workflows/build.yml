name: Build vsix

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - run: npm run compile
      - run: npm run package
      - name: Normalize vsix filename
        run: mv latex-preview-*.vsix latex-preview.vsix
      - name: Update rolling 'latest' release
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(jq -r .version package.json)
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          TITLE="v${VERSION} — ${TIMESTAMP}"
          NOTES="Auto-built from ${{ github.sha }} at ${TIMESTAMP}"
          if gh release view latest >/dev/null 2>&1; then
            gh release upload latest latex-preview.vsix --clobber
            gh release edit latest --title "${TITLE}" --notes "${NOTES}"
          else
            gh release create latest latex-preview.vsix \
              --title "${TITLE}" \
              --notes "${NOTES}" \
              --latest
          fi
